<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {

body { font-family: 'Chivo', sans-serif; background: var(--bg-dark); color: var(--text-primary); overflow: hidden; }
.app-container { display: flex; height: 100vh; }
.sidebar { width: 280px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5); }
.sidebar-header { padding: 24px 20px; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, var(--bg-card) 0%, #1a1010 100%); }
.sidebar-header h1 { font-size: 18px; font-weight: 900; background: linear-gradient(135deg, var(--accent-orange), var(--accent-yellow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
.progress-overview { font-size: 12px; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }
.nav-section { flex: 1; overflow-y: auto; padding: 12px 0; }
.nav-item { padding: 12px 20px; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; display: flex; justify-content: space-between; align-items: center; }
.nav-item:hover { background: var(--bg-hover); border-left-color: var(--accent-orange); }
.nav-item.active { background: var(--bg-hover); border-left-color: var(--accent-yellow); box-shadow: inset 4px 0 12px var(--shadow-glow); }
.nav-item-title { font-size: 14px; font-weight: 700; }
.nav-item-progress { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-secondary); }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
.action-btn { width: 100%; padding: 10px; margin-bottom: 8px; background: var(--bg-hover); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px; cursor: pointer; transition: all 0.2s; font-size: 13px; font-weight: 700; font-family: 'Chivo', sans-serif; }
.action-btn:hover { background: var(--accent-orange); border-color: var(--accent-orange); box-shadow: 0 4px 16px var(--shadow-orange); }
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.content-header { padding: 24px 32px; border-bottom: 1px solid var(--border); background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; }
.content-title { font-size: 24px; font-weight: 900; }
.filter-controls { display: flex; gap: 8px; }
.filter-btn { padding: 8px 16px; background: var(--bg-dark); border: 1px solid var(--border); color: var(--text-secondary); border-radius: 6px; cursor: pointer; transition: all 0.2s; font-size: 12px; font-weight: 700; }
.filter-btn.active { background: var(--accent-orange); color: var(--bg-dark); border-color: var(--accent-orange); }
.content-body { flex: 1; overflow-y: auto; padding: 32px; }
.topic-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow: hidden; transition: all 0.3s; }
.topic-card:hover { border-color: var(--accent-orange); box-shadow: 0 4px 24px var(--shadow-orange); }
.topic-card.hidden { display: none; }
.topic-header { padding: 20px 24px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, var(--bg-card) 0%, #0f0f0f 100%); }
.topic-header:hover { background: var(--bg-hover); }
.topic-title-section { display: flex; align-items: center; gap: 12px; flex: 1; }
.expand-icon { color: var(--accent-orange); transition: transform 0.3s; font-size: 18px; }
.expand-icon.expanded { transform: rotate(90deg); }
.topic-title { font-size: 16px; font-weight: 700; }
.topic-badge { font-size: 10px; padding: 4px 8px; border-radius: 4px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.badge-ai-first { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
.topic-controls { display: flex; gap: 8px; align-items: center; }
.status-indicator { width: 32px; height: 32px; border-radius: 6px; border: 2px solid var(--border); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.status-indicator.todo { background: var(--bg-dark); border-color: var(--text-secondary); }
.status-indicator.todo::after { content: '○'; color: var(--text-secondary); }
.status-indicator.in-progress { background: var(--accent-yellow); border-color: var(--accent-yellow); color: var(--bg-dark); }
.status-indicator.in-progress::after { content: '◐'; }
.status-indicator.done { background: var(--accent-green); border-color: var(--accent-green); color: var(--bg-dark); }
.status-indicator.done::after { content: '✓'; }
.move-btn { padding: 6px 12px; background: var(--bg-dark); border: 1px solid var(--border); color: var(--text-secondary); border-radius: 4px; cursor: pointer; font-size: 11px; transition: all 0.2s; font-weight: 700; }
.move-btn:hover { background: var(--accent-orange); color: var(--text-primary); border-color: var(--accent-orange); }
.topic-content { display: none; padding: 24px; border-top: 1px solid var(--border); background: var(--bg-dark); }
.topic-content.visible { display: block; }
.subtopic-list { margin-bottom: 24px; }
.subtopic-item { padding: 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 12px; transition: all 0.2s; }
.subtopic-item:hover { border-color: var(--accent-yellow); }
.subtopic-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.subtopic-name { font-size: 14px; font-weight: 700; color: var(--accent-yellow); }
.notes-section { margin-top: 12px; }
.notes-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; display: block; font-weight: 700; }
.notes-textarea { width: 100%; min-height: 80px; padding: 12px; background: var(--bg-dark); border: 1px solid var(--border); color: var(--text-primary); border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 13px; resize: vertical; }
.notes-textarea:focus { outline: none; border-color: var(--accent-orange); }
.interview-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
.interview-title { font-size: 14px; font-weight: 700; color: var(--accent-orange); margin-bottom: 12px; }
.interview-difficulty { margin-bottom: 16px; }
.difficulty-label { font-size: 12px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; display: block; }
.interview-questions { list-style: none; padding-left: 16px; }
.interview-questions li { font-size: 13px; color: var(--text-primary); margin-bottom: 6px; padding-left: 12px; position: relative; }
.interview-questions li:before { content: "▸"; position: absolute; left: 0; color: var(--accent-yellow); }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 1000; align-items: center; justify-content: center; }
.modal.visible { display: flex; }
.modal-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 32px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 48px rgba(0, 0, 0, 0.6); }
.modal-header { font-size: 20px; font-weight: 900; margin-bottom: 20px; color: var(--accent-orange); }
.modal-body { margin-bottom: 24px; }
.modal-footer { display: flex; gap: 12px; justify-content: flex-end; }
.modal-btn { padding: 10px 20px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-dark); color: var(--text-primary); cursor: pointer; font-weight: 700; transition: all 0.2s; }
.modal-btn.primary { background: var(--accent-orange); border-color: var(--accent-orange); }
.modal-btn:hover { box-shadow: 0 4px 16px var(--shadow-orange); }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-orange); }
.section-title { font-size: 18px; font-weight: 900; color: var(--text-secondary); margin-bottom: 16px; margin-top: 32px; padding-top: 32px; border-top: 2px solid var(--border); }
.empty-state { text-align: center; padding: 48px; color: var(--text-secondary); font-size: 14px; }
</style>

<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>Interview Prep Tracker</h1>
            <div class="progress-overview">

            </div>
        </div>
        <div class="nav-section" id="navSection"></div>
        <div class="sidebar-footer">
            <button class="action-btn" onclick="exportData()">📥 Export Backup</button>
            <button class="action-btn" onclick="importData()">📤 Import Backup</button>
            <button class="action-btn" onclick="exportNotesToPDF()">📄 Export Notes PDF</button>
        </div>
    </div>

    <div class="main-content">
        <div class="content-header">
            <h2 class="content-title" id="contentTitle">Select a Subject</h2>
            <div class="filter-controls">
                <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
                <button class="filter-btn" data-filter="todo" onclick="setFilter('todo')">Todo</button>
                <button class="filter-btn" data-filter="in-progress" onclick="setFilter('in-progress')">In Progress</button>
                <button class="filter-btn" data-filter="done" onclick="setFilter('done')">Done</button>
            </div>
        </div>
        <div class="content-body" id="contentBody">
            <div class="empty-state">
                Select a subject from the sidebar to begin your interview preparation journey
            </div>
        </div>
    </div>
</div>

<div class="modal" id="importModal">

        <div class="modal-footer">
            <button class="modal-btn" onclick="closeModal()">Cancel</button>
            <button class="modal-btn primary" onclick="confirmImport()">Import</button>
        </div>
    </div>
</div>

// State management
let currentSubject = null;
let currentFilter = 'all';

// Initialize app on load
document.addEventListener('DOMContentLoaded', () => {
    loadDataFromStorage();
    renderNavigation();
    updateGlobalProgress();
});

// Save state to localStorage
function saveToStorage() {
    try {
        localStorage.setItem('interviewPrepData', JSON.stringify(studyData));
        console.log('Data saved to localStorage');
    } catch (e) {
        console.error('Error saving to localStorage:', e);
    }
}

// Load state from localStorage
function loadDataFromStorage() {
    try {
        const stored = localStorage.getItem('interviewPrepData');
        if (stored) {
            const parsed = JSON.parse(stored);
            // Merge stored data with default data
            Object.keys(parsed).forEach(key => {
                if (studyData[key]) {
                    studyData[key] = parsed[key];
                }
            });
            console.log('Data loaded from localStorage');
        }
    } catch (e) {
        console.error('Error loading from localStorage:', e);
    }
}

// Render navigation sidebar
function renderNavigation() {
    const navSection = document.getElementById('navSection');
    navSection.innerHTML = '';
    
    Object.entries(studyData).forEach(([key, subject]) => {
        const progress = calculateSubjectProgress(subject);
        const navItem = document.createElement('div');
        navItem.className = 'nav-item';
        navItem.onclick = () => selectSubject(key);
        
        navItem.innerHTML = `
            <div class="nav-item-title">${subject.name}</div>
            <div class="nav-item-progress">${progress}%</div>
        `;
        
        navSection.appendChild(navItem);
    });
}

// Calculate progress for a subject
function calculateSubjectProgress(subject) {
    let total = 0;
    let completed = 0;
    
    subject.topics.forEach(topic => {
        if (topic.inScope !== false) {
            total++;
            if (topic.status === 'done') completed++;
        }
        
        topic.subtopics.forEach(subtopic => {
            if (typeof subtopic === 'string') {
                total++;
            }
        });
    });
    
    return total > 0 ? Math.round((completed / total) * 100) : 0;
}

// Calculate global progress
function updateGlobalProgress() {
    let totalTopics = 0;
    let completedTopics = 0;
    
    Object.values(studyData).forEach(subject => {
        subject.topics.forEach(topic => {
            if (topic.inScope !== false) {
                totalTopics++;
                if (topic.status === 'done') completedTopics++;
            }
        });
    });
    
    const progress = totalTopics > 0 ? Math.round((completedTopics / totalTopics) * 100) : 0;
    document.getElementById('globalProgress').textContent = progress + '%';
}

// Select a subject
function selectSubject(key) {
    currentSubject = key;
    
    // Update active nav item
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    event.currentTarget.classList.add('active');
    
    // Update content
    document.getElementById('contentTitle').textContent = studyData[key].name;
    renderTopics();
}

// Render topics for selected subject
function renderTopics() {
    const contentBody = document.getElementById('contentBody');
    const subject = studyData[currentSubject];
    
    const scopeTopics = subject.topics.filter(t => t.inScope !== false);
    const nonScopeTopics = subject.topics.filter(t => t.inScope === false);
    
    let html = '';
    
    // In-scope topics
    scopeTopics.forEach((topic, index) => {
        html += renderTopicCard(topic, index, false);
    });
    
    // Non-required section
    if (nonScopeTopics.length > 0) {
        html += '<div class="section-title">📦 Non-Required Topics (Moved Out)</div>';
        nonScopeTopics.forEach((topic, index) => {
            html += renderTopicCard(topic, scopeTopics.length + index, true);
        });
    }
    
    contentBody.innerHTML = html || '<div class="empty-state">No topics available</div>';
}

// Render individual topic card
function renderTopicCard(topic, index, isNonRequired) {
    const shouldHide = currentFilter !== 'all' && topic.status !== currentFilter;
    const aiFirstBadge = topic.aiFirst ? '<span class="topic-badge badge-ai-first">AI-FIRST</span>' : '';
    
    return `
        <div class="topic-card ${shouldHide ? 'hidden' : ''}" data-index="${index}">
            <div class="topic-header" onclick="toggleTopic(${index})">
                <div class="topic-title-section">
                    <span class="expand-icon" id="expand-${index}">▶</span>
                    <span class="topic-title">${topic.name}</span>
                    ${aiFirstBadge}
                </div>
                <div class="topic-controls">
                    <div class="status-indicator ${topic.status}" onclick="event.stopPropagation(); cycleStatus(${index})" title="${topic.status}"></div>
                    <button class="move-btn" onclick="event.stopPropagation(); moveToNonRequired(${index})">${isNonRequired ? '↩ Move to Scope' : '📦 Move Out'}</button>
                </div>
            </div>
            <div class="topic-content" id="content-${index}">
                <div class="subtopic-list">
                    ${topic.subtopics.map((sub, subIdx) => {
                        const subName = typeof sub === 'string' ? sub : sub.name;
                        return `
                            <div class="subtopic-item">
                                <div class="subtopic-header">
                                    <span class="subtopic-name">${subName}</span>
                                </div>
                                <div class="notes-section">
                                    <label class="notes-label">✍ Notes (supports \`code\` with backticks):</label>
                                    <textarea class="notes-textarea" placeholder="Add your notes, code snippets, or key learnings here..." oninput="saveSubtopicNotes(${index}, ${subIdx}, this.value)">${typeof sub === 'object' ? (sub.notes || '') : ''}</textarea>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
                ${renderInterviewQuestions(topic)}
            </div>
        </div>
    `;
}

// Render interview questions
function renderInterviewQuestions(topic) {
    if (!topic.interviewQuestions) return '';
    
    return `
        <div class="interview-section">
            <div class="interview-title">💼 Interview Questions</div>
            
            <div class="interview-difficulty">
                <span class="difficulty-label">🟢 Easy (3 YOE):</span>
                <ul class="interview-questions">
                    ${topic.interviewQuestions.easy.map(q => `<li>${q}</li>`).join('')}
                </ul>
            </div>
            
            <div class="interview-difficulty">
                <span class="difficulty-label">🟡 Medium (5 YOE):</span>
                <ul class="interview-questions">
                    ${topic.interviewQuestions.medium.map(q => `<li>${q}</li>`).join('')}
                </ul>
            </div>
            
            <div class="interview-difficulty">
                <span class="difficulty-label">🔴 Hard (8 YOE):</span>
                <ul class="interview-questions">
                    ${topic.interviewQuestions.hard.map(q => `<li>${q}</li>`).join('')}
                </ul>
            </div>
        </div>
    `;
}

// Toggle topic expansion
function toggleTopic(index) {
    const content = document.getElementById(`content-${index}`);
    const icon = document.getElementById(`expand-${index}`);
    
    if (content.classList.contains('visible')) {
        content.classList.remove('visible');
        icon.classList.remove('expanded');
    } else {
        content.classList.add('visible');
        icon.classList.add('expanded');
    }
}

// Cycle through status states
function cycleStatus(index) {
    const subject = studyData[currentSubject];
    const topic = subject.topics[index];
    
    const states = ['todo', 'in-progress', 'done'];
    const currentIndex = states.indexOf(topic.status);
    const nextIndex = (currentIndex + 1) % states.length;
    
    topic.status = states[nextIndex];
    saveToStorage();
    updateGlobalProgress();
    renderTopics();
    renderNavigation();
}

// Move topic to/from non-required pool
function moveToNonRequired(index) {
    const subject = studyData[currentSubject];
    const topic = subject.topics[index];
    
    topic.inScope = !topic.inScope;
    saveToStorage();
    updateGlobalProgress();
    renderTopics();
    renderNavigation();
}

// Save subtopic notes
function saveSubtopicNotes(topicIndex, subtopicIndex, notes) {
    const subject = studyData[currentSubject];
    const topic = subject.topics[topicIndex];
    const subtopic = topic.subtopics[subtopicIndex];
    
    if (typeof subtopic === 'string') {
        topic.subtopics[subtopicIndex] = { name: subtopic, notes: notes };
    } else {
        subtopic.notes = notes;
    }
    
    saveToStorage();
}

// Set filter
function setFilter(filter) {
    currentFilter = filter;
    
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
    });
    
    if (currentSubject) {
        renderTopics();
    }
}

// Export data as JSON
function exportData() {
    const dataStr = JSON.stringify(studyData, null, 2);
    const dataBlob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(dataBlob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `interview-prep-backup-${new Date().toISOString().split('T')[0]}.json`;
    link.click();
    URL.revokeObjectURL(url);
}

// Import data from JSON
function importData() {
    document.getElementById('importModal').classList.add('visible');
}

function closeModal() {
    document.getElementById('importModal').classList.remove('visible');
}

function confirmImport() {
    const fileInput = document.getElementById('importFile');
    const file = fileInput.files[0];
    
    if (!file) {
        alert('Please select a file');
        return;
    }
    
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const imported = JSON.parse(e.target.result);
            Object.keys(imported).forEach(key => {
                if (studyData[key]) {
                    studyData[key] = imported[key];
                }
            });
            saveToStorage();
            renderNavigation();
            updateGlobalProgress();
            if (currentSubject) {
                renderTopics();
            }
            closeModal();
            alert('Data imported successfully!');
        } catch (err) {
            alert('Error importing file: ' + err.message);
        }
    };
    reader.readAsText(file);
}

// Export notes to PDF
function exportNotesToPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let yPos = 20;
    const lineHeight = 7;
    const pageHeight = doc.internal.pageSize.height;
    
    doc.setFontSize(16);
    doc.text('Interview Prep Notes', 20, yPos);
    yPos += 15;
    
    Object.values(studyData).forEach(subject => {
        doc.setFontSize(14);
        doc.setFont(undefined, 'bold');
        doc.text(subject.name, 20, yPos);
        yPos += 10;
        
        subject.topics.forEach(topic => {
            if (topic.inScope === false) return;
            
            doc.setFontSize(12);
            doc.setFont(undefined, 'bold');
            doc.text(`  ${topic.name}`, 20, yPos);
            yPos += 8;
            
            topic.subtopics.forEach(subtopic => {
                const sub = typeof subtopic === 'object' ? subtopic : { name: subtopic, notes: '' };
                if (sub.notes && sub.notes.trim()) {
                    doc.setFontSize(10);
                    doc.setFont(undefined, 'normal');
                    doc.text(`    - ${sub.name}`, 20, yPos);
                    yPos += 6;
                    
                    const lines = doc.splitTextToSize(`      ${sub.notes}`, 170);
                    lines.forEach(line => {
                        if (yPos > pageHeight - 20) {
                            doc.addPage();
                            yPos = 20;
                        }
                        doc.text(line, 20, yPos);
                        yPos += lineHeight;
                    });
                    yPos += 3;
                }
            });
            
            yPos += 5;
            if (yPos > pageHeight - 30) {
                doc.addPage();
                yPos = 20;
            }
        });
        
        yPos += 10;
        if (yPos > pageHeight - 30) {
            doc.addPage();
            yPos = 20;
        }
    });
    
    doc.save(`interview-prep-notes-${new Date().toISOString().split('T')[0]}.pdf`);
}
